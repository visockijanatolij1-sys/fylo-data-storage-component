<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo Data Storage Component</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="app">
                <div class="app-files_container">
                    <div class="app-logo_container">
                        <img src="./images/logo.svg" alt="Fylo Logo">
                    </div>
                    <div class="app-upload_block">
                        <button class="app-upload_button button"  aria-label="Upload new document">
                            <img src="./images/icon-document.svg" alt="Document">
                        </button>

                        <button class="app-upload_button button"  aria-label="Upload new folder">
                            <img src="./images/icon-folder.svg" alt="Folder">
                        </button>

                        <button class="app-upload_button button"  aria-label="Upload button">
                            <img src="./images/icon-upload.svg" alt="Upload">
                        </button>
                    </div>
                </div>
                <div class="app-storage_container">
                    <p class="storage-text">You’ve used <span>815 GB</span> of your storage</p>
                    
                    <div class="storage-progress" aria-hidden="true">
                        <div class="storage-progress-fill"></div>
                    </div>

                    <div class="storage-space">185 <span>GB LEFT</span></div>

                    <div class="starage-capacity_block">
                        <p class="capacity-start">0</p>
                        <p class="capacity-end">1000 GB</p>
                    </div>
                </div>
            </div>            
        </div>
    </div>


</body>
</html>
